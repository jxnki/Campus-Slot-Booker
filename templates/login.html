{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block back_button %}
<button class="back-btn" onclick="history.back()">
    ← Back
</button>
{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Login</h2>

    <form action="/login" method="POST">
        <div class="login-switch">

            <input
                type="radio"
                id="student"
                name="role"
                value="Student"
                {% if selected_role != "Admin" %}checked{% endif %}
            >

            <label for="student">
                Student Login
            </label>

            <input
                type="radio"
                id="admin"
                name="role"
                value="Admin"
                {% if selected_role == "Admin" %}checked{% endif %}
            >

            <label for="admin">
                Admin Login
            </label>

        </div>
        <div class="form-group">
            <label>Email</label>

            <input
                type="email"
                name="email"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                type="password"
                name="password"
                required
            >
        </div>

        <button class="button">
            Login
        </button>

    </form>

</div>

{% endblock %}
